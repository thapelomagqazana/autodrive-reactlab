# AutoDrive ReactLab CI
#
# Purpose:
#   Validates every pull request and main-branch push before code is trusted.
#
# Pipeline responsibilities:
#   - install dependencies reproducibly
#   - run lint checks
#   - run unit/component tests
#   - run production build
#
# Non-responsibilities:
#   - no deployment
#   - no secrets
#   - no release publishing
#   - no mutation of repository files

name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  # Cancel older CI runs for the same branch/PR.
  # This reduces wasted GitHub Actions minutes and avoids stale results.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # CI only needs read access to source code.
  contents: read

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build
